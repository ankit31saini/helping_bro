services:
  - type: web
    name: ai-job-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
    
    # Critically required by Puppeteer to run Headless Chrome on Render.com
    osPackages:
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libdbus-1-3
      - libxcb1
      - libxkbcommon0
      - libx11-6
      - libxcomposite1
      - libxdamage1
      - libxext6
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libasound2
      - libpangocairo-1.0-0
      - libpango-1.0-0
      - libcairo2
      - libxss1
      - libgtk-3-0
